<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediSense AI - Health Risk Assistant</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="chat-app-container">
        <!-- Header -->
        <header class="chat-header">
            <div class="logo-container">
                <div class="logo-icon">🩺</div>
                <h1 class="logo-text">MediSense <span class="logo-accent">AI</span></h1>
            </div>
        </header>

        <!-- Main Chat Area -->
        <main class="chat-main" id="chat-main">
            <div class="chat-bubbles" id="chat-bubbles-list">
                <!-- Welcome Message -->
                <div class="chat-bubble ai">
                    <div class="bubble-content">
                        👋 Hello! I am your AI health assistant.<br>
                        Describe your symptoms to get started.
                    </div>
                </div>
            </div>
            <!-- Typing Indicator (Hidden by default) -->
            <div class="typing-indicator-container" id="typing-indicator" style="display: none;">
                <div class="chat-bubble ai">
                    <div class="typing-indicator">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            </div>
        </main>

        <!-- Error Banner (Hidden by default) -->
        <div class="error-banner" id="error-banner" style="display: none;">
            ⚠️ <span id="error-message">Connection error.</span>
        </div>

        <!-- Fixed Bottom Input Area -->
        <footer class="chat-footer">
            <div class="input-wrapper">
                <button id="voice-btn" class="icon-btn" type="button" title="Speak">
                    🎤
                </button>
                <textarea 
                    id="chat-input" 
                    placeholder="Message MediSense AI..." 
                    rows="1" 
                    maxlength="500"></textarea>
                <button id="send-btn" class="icon-btn primary-icon-btn" type="button" title="Send">
                    ➤
                </button>
            </div>
            <div class="footer-disclaimer">
                MediSense AI provides general educational guidance. It is NOT a diagnostic tool. In an emergency, call 911 immediately.
            </div>
        </footer>
    </div>
    
    <script type="module" src="js/app.js"></script>
</body>
</html>
